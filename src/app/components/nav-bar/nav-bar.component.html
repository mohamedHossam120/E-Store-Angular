<div class="nav bg-light shadow-sm py-2">
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold d-flex align-items-center text-primary" routerLink="/products">
          <i class="bi bi-bag-heart-fill me-2"></i> E-STORE
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navContent">
          @if (isBrowser) {
            
            @if (userName) {
              <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-lg-center">
                <li class="nav-item">
                  <a class="nav-link fw-medium px-3" routerLink="/products" routerLinkActive="text-primary fw-bold">Products</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link fw-medium px-3" routerLink="/wishlist" routerLinkActive="text-primary fw-bold">Wishlist</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link fw-medium px-3" routerLink="/allorders" routerLinkActive="text-primary fw-bold">Orders</a>
                </li>
              </ul>
            }

            <div class="d-flex flex-column flex-lg-row align-items-start align-items-lg-center gap-3 mt-3 mt-lg-0 ms-auto">
              @if (userName) {
                <a routerLink="/cart" class="text-dark position-relative d-inline-block mx-lg-3 my-2 my-lg-0">
                  <i class="bi bi-cart3 fs-4"></i>
                  <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">
                    {{ countNumber }}
                  </span>
                </a>

                <div class="d-flex align-items-center gap-3">
                  <span class="text-dark fw-bold small">Welcome, <span class="text-primary">{{ userName }}</span></span>
                  <button (click)="callLogOut()" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</button>
                </div>
              } @else {
                <div class="d-flex align-items-center gap-3 pb-3 pb-lg-0">
                  <a routerLink="/login" routerLinkActive="text-primary fw-bold" class="text-decoration-none fw-medium text-dark">Login</a>
                  <a routerLink="/register" class="btn btn-primary rounded-pill px-4 shadow-sm">Register</a>
                </div>
              }
            </div>
          }
        </div>
      </div>
    </nav>
  </div>
</div>
