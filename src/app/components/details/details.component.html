@if (productDetails) {
  <div class="container my-5 pt-5">
    <div class="row align-items-center">
      <div class="col-md-4">
        <img [src]="productDetails.imageCover" class="w-100 rounded shadow" [alt]="productDetails.title">
      </div>

      <div class="col-md-8">
        <h2 class="fw-bold">{{productDetails.title}}</h2>
        <p class="text-muted my-4">{{productDetails.description}}</p>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="text-primary fw-bold">{{productDetails.price}} EGP</h4>
          <span>
            <i class="bi bi-star-fill text-warning"></i> {{productDetails.ratingsAverage}}
          </span>
        </div>

        <button (click)="addToCart(productDetails.id)" class="btn btn-primary w-100 py-2 fw-bold">
          <i class="bi bi-cart-plus-fill me-2"></i> Add to Cart
        </button>
      </div>
    </div>
  </div>
}
